name: Nuke build verification

# Local-build verification gate. Complements (does NOT replace) publish.yml:
#   - publish.yml stays small + npm-direct so trusted-publishing OIDC keeps working
#     unchanged.
#   - nuke.yml runs the IDomainConventionsApi pipeline end-to-end (`./build.sh Check`)
#     to guarantee restore -> lockstep -> compile -> no-manual-edits -> emit-all ->
#     determinism -> pack all pass on a clean checkout.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nuke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: build/global.json

      - name: Show toolchain
        run: |
          node --version
          npm --version
          dotnet --version

      - name: Run Nuke Check
        run: ./build.sh Check
