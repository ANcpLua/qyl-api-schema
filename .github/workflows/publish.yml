name: Publish (npmjs.org + nuget.org)

# Synced public-registry release via OIDC trusted publishing — NO stored secrets, NO hand-bumped
# versions. The git tag is the single source of version truth: "Resolve release version" stamps both
# npm and NuGet from it, so committed files carry no authoritative version.
#   npm   @ancplua/qyl-api-schema -> registry.npmjs.org  (npm trusted publishing + provenance)
#   nuget Qyl.Api.Contracts       -> nuget.org           (NuGet/login OIDC -> 1-hour key)
#
# Ordered and restartable: the NuGet is packed + validated before either publish, existing immutable
# versions must carry this checkout's commit, NuGet pushes idempotently, and npm is skipped only when
# that exact commit is already indexed. The registries are not an atomic transaction.
#
# Routing: the committed .npmrc maps @ancplua -> GitHub Packages for INSTALL of internal build deps;
# that scope map wins over publishConfig.registry for scoped publishes, so THIS package is forced to
# npmjs by the explicit --@ancplua:registry flag on the npm publish step (NOT publishConfig.registry).
#
# Setup is complete: @ancplua/qyl-api-schema is bootstrapped on npmjs and trusted-publisher policies
# exist on both registries (Workflow File: publish.yml, Environment: release). Runs unattended on a
# published GitHub Release whose tag is vMAJOR.MINOR.PATCH[-prerelease].

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish, e.g. 0.3.0 or v0.3.0 (required for manual runs; release events derive it from the tag).'
        required: true
      tag:
        description: 'npm dist-tag (alphanumerics, dot, underscore, hyphen). Leave blank to auto-pick (latest for stable releases, next for prereleases).'
        required: false
        default: ''

permissions:
  contents: read
  packages: read      # read internal @ancplua/* deps from GitHub Packages at install
  id-token: write     # OIDC for BOTH npm trusted publishing/provenance AND NuGet/login

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release   # must match the npmjs trusted-publisher AND the nuget.org policy Environment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Install side: internal @ancplua/* deps resolve from GitHub Packages (.npmrc scope map).
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ancplua'

      # Trusted publishing to npmjs needs npm >= 11.5.1; Node 24 bundles an older npm.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: build/global.json

      - name: Verify package.json is not private
        run: |
          if [ "$(node -p "require('./package.json').private || false")" = "true" ]; then
            echo "::error::package.json has \"private\": true — refusing to publish."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local emitters
        run: npm run build:emitters

      - name: Lint TypeSpec (full surface)
        run: npm run lint

      - name: Lint TypeSpec (published surface only)
        run: npm run lint:public

      - name: Resolve npm dist-tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_TAG" ]; then
            dist_tag="$DISPATCH_TAG"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            dist_tag="next"
          else
            dist_tag="latest"
          fi
          if ! [[ "$dist_tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid npm dist-tag: $dist_tag (must match ^[A-Za-z0-9._-]+$)"
            exit 1
          fi
          echo "NPM_DIST_TAG=$dist_tag" >> "$GITHUB_ENV"
          echo "Resolved dist-tag: $dist_tag"

      # The git tag is the single source of version truth: stamp package.json so npm publishes that
      # version AND Build.cs (which reads package.json at pack time) stamps the same version onto the
      # NuGet — lockstep by construction. Validate to NuGet- AND npm-compatible SemVer (no build
      # metadata, which npm rejects and NuGet strips).
      - name: Resolve release version (from tag)
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            ver="${RELEASE_TAG#v}"
          else
            ver="${DISPATCH_VERSION#v}"
          fi
          if [ -z "$ver" ]; then
            echo "::error::No version to publish — a release needs a tag, a manual run needs the 'version' input."
            exit 1
          fi
          # Strict SemVer (semver.org), minus build metadata (npm rejects it, NuGet strips it):
          # no leading zeros in core/numeric ids, no empty or trailing prerelease identifiers.
          if ! [[ "$ver" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?$ ]]; then
            echo "::error::Version '$ver' is not strict MAJOR.MINOR.PATCH[-prerelease] with no build metadata (npm + NuGet must both accept it)."
            exit 1
          fi
          npm version "$ver" --no-git-tag-version --allow-same-version
          echo "RELEASE_VERSION=$ver" >> "$GITHUB_ENV"
          echo "Release version: $ver (npm + NuGet stamped from the git tag)"

      - name: Validate any existing immutable artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_commit="$(git rev-parse HEAD)"

          npm_metadata="$(mktemp)"
          npm_status="$(curl --silent --show-error --location --retry 5 --retry-all-errors \
            --output "${npm_metadata}" --write-out '%{http_code}' \
            "https://registry.npmjs.org/%40ancplua%2Fqyl-api-schema/${RELEASE_VERSION}")"
          case "${npm_status}" in
            200)
              npm_commit="$(jq -r '.gitHead // empty' "${npm_metadata}")"
              if [[ "${npm_commit}" != "${release_commit}" ]]; then
                echo "::error::npm ${RELEASE_VERSION} exists from ${npm_commit:-unknown}, not ${release_commit}"
                exit 1
              fi
              echo "NPM_ALREADY_PUBLISHED=true" >> "${GITHUB_ENV}"
              ;;
            404)
              echo "NPM_ALREADY_PUBLISHED=false" >> "${GITHUB_ENV}"
              ;;
            *)
              echo "::error::npm registry returned HTTP ${npm_status}"
              exit 1
              ;;
          esac

          lower_version="$(printf '%s' "${RELEASE_VERSION}" | tr '[:upper:]' '[:lower:]')"
          nuget_archive="$(mktemp)"
          nuget_url="https://api.nuget.org/v3-flatcontainer/qyl.api.contracts/${lower_version}/qyl.api.contracts.${lower_version}.nupkg"
          nuget_status="$(curl --silent --show-error --location --retry 5 --retry-all-errors \
            --output "${nuget_archive}" --write-out '%{http_code}' "${nuget_url}")"
          case "${nuget_status}" in
            200)
              nuget_commit="$(unzip -p "${nuget_archive}" '*.nuspec' \
                | sed -n 's/.*<repository[^>]*commit="\([^"]*\)".*/\1/p' \
                | head -n 1)"
              if [[ "${nuget_commit}" != "${release_commit}" ]]; then
                echo "::error::NuGet ${RELEASE_VERSION} exists from ${nuget_commit:-unknown}, not ${release_commit}"
                exit 1
              fi
              ;;
            404) ;;
            *)
              echo "::error::nuget.org returned HTTP ${nuget_status}"
              exit 1
              ;;
          esac

      # Pack + validate the NuGet BEFORE any publish: both registries are immutable, so a pack
      # failure must abort the whole release with nothing pushed. Output:
      # Artifacts/nuget/Qyl.Api.Contracts.<version>.nupkg
      - name: Pack C# contracts NuGet (validate before any publish)
        run: ./build.sh PackContractsNuget

      # Exercise the exact packed artifacts from isolated consumers before either
      # immutable registry accepts them. The post-publish gate repeats the same
      # imports/restores from the public registries after registration completes.
      - name: Pack npm and smoke clean consumers before immutable publish
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Artifacts/npm
          npm pack --pack-destination Artifacts/npm

          npm_tarballs=(Artifacts/npm/*.tgz)
          nuget_packages=(Artifacts/nuget/*.nupkg)
          if [ "${#npm_tarballs[@]}" -ne 1 ] || [ "${#nuget_packages[@]}" -ne 1 ]; then
            echo "::error::Expected one npm tarball and one NuGet package; found ${#npm_tarballs[@]} and ${#nuget_packages[@]}."
            exit 1
          fi

          node scripts/verify-packed.mjs "$RELEASE_VERSION" "${npm_tarballs[0]}" "${nuget_packages[0]}"

      # --- Publish (both immutable; packs already validated) ---
      # Order matters: NuGet first (its push is idempotent via --skip-duplicate), npm last. A retry
      # accepts an existing version only when registry provenance points at this exact checkout, then
      # skips the immutable npm publish and resumes at the index/consumer gate.

      # nuget -> nuget.org via OIDC. Request the login immediately before the push (key lives 1 hour).
      - name: Authenticate to NuGet (OIDC)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua

      - name: Push C# contracts NuGet to nuget.org
        run: |
          shopt -s nullglob
          pushed=0
          for pkg in Artifacts/nuget/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
            pushed=1
          done
          if [ "$pushed" = "0" ]; then
            echo "::error::No .nupkg in Artifacts/nuget — PackContractsNuget produced nothing to push."
            exit 1
          fi

      # npm -> npmjs.org via OIDC trusted publishing, LAST because it is immutable. No
      # NODE_AUTH_TOKEN: npm mints a short-lived credential from the OIDC token. Routing is forced by
      # the explicit --@ancplua:registry flag below: the committed .npmrc maps @ancplua -> GitHub
      # Packages for INSTALL and that scope map wins over publishConfig.registry for scoped publishes,
      # so without the flag this would silently land on GitHub Packages and OIDC would never apply.
      - name: Publish npm to npmjs.org (OIDC + provenance)
        run: |
          if [ "$NPM_ALREADY_PUBLISHED" = "true" ]; then
            echo "@ancplua/qyl-api-schema@$RELEASE_VERSION is already indexed from this commit; resuming after publish."
          else
            npm publish --access public --provenance --tag "$NPM_DIST_TAG" --@ancplua:registry=https://registry.npmjs.org
          fi

      - name: Wait for both indexes and smoke clean consumers
        run: node scripts/verify-published.mjs "$RELEASE_VERSION"
