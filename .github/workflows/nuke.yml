name: Nuke build verification

# Local-build verification gate. Complements (does NOT replace) publish.yml:
#   - publish.yml stays small + npm-direct so trusted-publishing OIDC keeps working
#     unchanged.
#   - nuke.yml runs the IDomainConventionsApi pipeline end-to-end (`./build.sh Check`)
#     to guarantee restore -> lockstep -> compile -> no-manual-edits -> emit-all ->
#     determinism -> pack all pass on a clean checkout.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read      # npm ci (RestoreTypeSpecDeps) reads internal @ancplua/* deps from GitHub Packages

concurrency:
  group: nuke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Authenticate npm to GitHub Packages so the Nuke RestoreTypeSpecDeps (npm ci) can download
      # internal @ancplua/* build deps (e.g. @ancplua/typespec-otel-semconv) — without this the run
      # fails with npm E401 (this is why the workflow had been red and was disabled).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ancplua'

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: build/global.json

      - name: Show toolchain
        run: |
          node --version
          npm --version
          dotnet --version

      - name: Run Nuke Check
        run: ./build.sh Check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # npm ci auth for GitHub Packages
